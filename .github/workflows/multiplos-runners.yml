name: multiplos-runners

on: [push]

jobs:
  Run-Linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Installar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Rodar Script
        run: node ./scripts/script.js

  Run-Mac:
    runs-on: macos-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Installar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Rodar Script
        run: node ./scripts/script.js

  Run-Windows:
    runs-on: windows-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Installar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Rodar Script
        run: node ./scripts/script.js
